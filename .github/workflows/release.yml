name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-graalvm:
    name: Release GraalVM
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer

      - name: Set up GraalVM (Liberica NIK)
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: 'liberica'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build GraalVM native packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION="1.0.0"
          fi
          ./gradlew :app:packageGraalvmDmg :app:packageGraalvmZip -PappVersion=$VERSION -PnativeMarch=compatibility --no-daemon

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/compose/binaries/**/graalvm-dmg/*.dmg
            app/build/compose/binaries/**/graalvm-zip/*.zip
